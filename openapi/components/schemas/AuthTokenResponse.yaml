type: object
required:
  - access_token
  - token_type
  - expires_in
properties:
  access_token:
    type: string
    description: JWT de plataforma de corta duración.
  token_type:
    type: string
    enum:
      - Bearer
    description: Tipo de token. Siempre `Bearer`.
  expires_in:
    type: integer
    description: >-
      Platform JWT lifetime in seconds. When this duration elapses, re-authenticate via the
      Firebase SDK (`onIdTokenChanged` / `getIdToken(forceRefresh=true)`) to obtain a new
      Firebase ID token, then re-call `POST /auth/token`. No refresh_token is issued.
    example: 3600
