post:
  summary: Intercambiar token de Firebase por JWT de plataforma
  operationId: postAuthToken
  description: |
    Exchanges a valid Firebase ID token for a short-lived platform JWT.

    The platform JWT lifetime is controlled by `JWT_EXPIRY_SECONDS` (default: 3600 seconds / 1 hour)
    and is reflected in the `expires_in` field of the response. **No refresh token is issued.**

    When the platform JWT expires, clients must re-authenticate using the following flow:
    1. Use the Firebase SDK's silent refresh to obtain a new Firebase ID token — either by listening
       to `onIdTokenChanged` or by calling `getIdToken(forceRefresh=true)`.
    2. Re-call `POST /auth/token` with the new Firebase ID token to obtain a fresh platform JWT.

    The Firebase SDK manages Firebase refresh tokens internally; clients do not need to handle
    them directly.
  tags:
    - Auth
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/AuthTokenRequest.yaml'
        example:
          firebase_token: eyJhbGciOiJSUzI1NiIsImtpZCI6Ii4uLiJ9...
          clinic_id: clinic_abc123
  responses:
    '200':
      description: Token de acceso emitido correctamente.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/AuthTokenResponse.yaml'
          example:
            access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            token_type: Bearer
            expires_in: 3600
    '401':
      description: No autorizado.
      content:
        application/problem+json:
          schema:
            $ref: '../components/schemas/ErrorResponse.yaml'
          examples:
            cuenta_desactivada:
              summary: Cuenta desactivada
              value:
                type: https://api.climan.app/errors/account-deactivated
                title: Cuenta desactivada
                status: 401
                detail: La cuenta del usuario está desactivada.
            correo_no_coincide:
              summary: Correo electrónico no coincide
              value:
                type: https://api.climan.app/errors/email-mismatch
                title: Correo electrónico no coincide
                status: 401
                detail: El correo electrónico del token no coincide con el registro.
            token_invalido:
              summary: Token de Firebase inválido
              value:
                type: https://api.climan.app/errors/invalid-firebase-token
                title: Token de Firebase inválido
                status: 401
                detail: El token de Firebase es inválido o ha expirado.
    '404':
      description: No encontrado.
      content:
        application/problem+json:
          schema:
            $ref: '../components/schemas/ErrorResponse.yaml'
          example:
            type: https://api.climan.app/errors/staff-not-found
            title: Personal no encontrado
            status: 404
            detail: No se encontró ningún miembro del personal con ese correo en la clínica indicada.
