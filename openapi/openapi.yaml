openapi: 3.0.3
info:
  version: 1.0.0
  title: Climan API
  license:
    name: Proprietary
  description: >
    API for clinic management system. Authentication is handled via Firebase
    (Google SSO). Users exchange a Firebase ID token for a short-lived platform
    JWT used on all subsequent requests.
servers:
  - url: https://api.climan.app/v1
tags:
  - name: Auth
    description: Authentication endpoints.
  - name: Staff
    description: Staff profile and management.
security:
  - BearerAuth: []
paths:
  /auth/token:
    $ref: 'paths/auth_token.yaml'
  /me:
    $ref: 'paths/me.yaml'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Short-lived platform JWT issued by `POST /auth/token`. Contains
        `staff_id` and `clinic_id`. Roles and specialty are resolved from the
        database on each request, not encoded in the token.
  schemas:
    StaffProfile:
      $ref: 'components/schemas/StaffProfile.yaml'
    AuthTokenRequest:
      $ref: 'components/schemas/AuthTokenRequest.yaml'
    AuthTokenResponse:
      $ref: 'components/schemas/AuthTokenResponse.yaml'
    Problem:
      $ref: 'components/schemas/ErrorResponse.yaml'
